name: Cypress

on:
  push:
  pull_request:

jobs:
  cypress:
    runs-on: ubuntu-latest
    env:
      CYPRESS_email: ${{ secrets.CYPRESS_EMAIL }}
      CYPRESS_password: ${{ secrets.CYPRESS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Validate Cypress secrets
        shell: bash
        run: |
          if [ -z "$CYPRESS_email" ] || [ -z "$CYPRESS_password" ]; then
            echo "Missing Cypress credentials. Configure repository secrets CYPRESS_EMAIL and CYPRESS_PASSWORD."
            exit 1
          fi

      # The Partner lifecycle spec is excluded from CI because it creates
      # persistent data and UI deletion requires Google Authenticator OTP/TOTP.
      - name: Run Cypress smoke tests
        run: npm run cy:run:smoke
